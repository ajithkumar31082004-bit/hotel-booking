version: "3.8"

services:
  # The Main Hotel Reservation Web App
  web-app:
    build: .
    container_name: blissful-abodes-web
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUTF8=1
    command: python app.py
    restart: unless-stopped

  # The AI Chatbot Concierge Interface
  ai-agent:
    build: .
    container_name: blissful-abodes-agent
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - PYTHONUTF8=1
      # The Google API Key is read from the environment or `.env` file
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    command: streamlit run agent.py
    restart: unless-stopped
